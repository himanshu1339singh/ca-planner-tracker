<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CA Inter Sep 2026 — Study Planner Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f13;--card:#1a1a24;--card2:#22223a;--border:#2a2a40;
  --text:#e8e8f0;--dim:#8888aa;--accent:#6c5ce7;--accent2:#a29bfe;
  --green:#00b894;--green2:#55efc4;--orange:#fdcb6e;--red:#ff7675;
  --blue:#74b9ff;--purple:#a29bfe;--pink:#fd79a8;
  --phase1:#6c5ce7;--phase2:#0984e3;--phase3:#00b894;
  --phase4:#fdcb6e;--phase5:#e17055;--phase6:#d63031;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:16px}

/* Header */
.header{text-align:center;padding:32px 16px 24px;position:relative}
.header h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.header .subtitle{color:var(--dim);font-size:0.85rem;margin-top:6px}
.header .exam-countdown{margin-top:16px;padding:12px 24px;background:linear-gradient(135deg,rgba(108,92,231,0.15),rgba(253,121,168,0.1));border:1px solid rgba(108,92,231,0.3);border-radius:12px;display:inline-block}
.header .exam-countdown .days-left{font-size:2rem;font-weight:800;color:var(--accent2)}
.header .exam-countdown .days-label{font-size:0.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}

/* Stats Bar */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:20px 0}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-card .stat-value{font-size:1.8rem;font-weight:800}
.stat-card .stat-label{font-size:0.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.stat-green .stat-value{color:var(--green2)}
.stat-blue .stat-value{color:var(--blue)}
.stat-orange .stat-value{color:var(--orange)}
.stat-purple .stat-value{color:var(--purple)}
.stat-red .stat-value{color:var(--red)}

/* Progress bar */
.progress-section{margin:20px 0}
.progress-bar-outer{background:var(--card);border:1px solid var(--border);border-radius:10px;height:28px;overflow:hidden;position:relative}
.progress-bar-inner{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.5s ease;position:relative}
.progress-bar-inner::after{content:attr(data-pct);position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:0.75rem;font-weight:700;color:#fff}
.progress-label{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--dim);margin-top:6px}

/* Navigation */
.nav-tabs{display:flex;gap:8px;margin:20px 0;overflow-x:auto;padding-bottom:4px}
.nav-tab{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-size:0.8rem;white-space:nowrap;transition:all 0.2s}
.nav-tab:hover{border-color:var(--accent);color:var(--text)}
.nav-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* Dashboard Grid */
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;margin:16px 0}
.week-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.week-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,92,231,0.15)}
.week-card.current-week{border-color:var(--green);box-shadow:0 0 20px rgba(0,184,148,0.15)}
.week-card.current-week::before{content:"THIS WEEK";position:absolute;top:8px;right:8px;font-size:0.6rem;background:var(--green);color:#fff;padding:2px 8px;border-radius:4px;font-weight:700;letter-spacing:0.5px}
.week-card .wk-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.week-card .wk-name{font-weight:700;font-size:1rem}
.week-card .wk-phase{font-size:0.65rem;padding:3px 8px;border-radius:4px;font-weight:600;letter-spacing:0.5px}
.phase-1{background:rgba(108,92,231,0.2);color:var(--phase1)}
.phase-2{background:rgba(9,132,227,0.2);color:var(--phase2)}
.phase-3{background:rgba(0,184,148,0.2);color:var(--phase3)}
.phase-4{background:rgba(253,203,110,0.2);color:var(--phase4)}
.phase-5{background:rgba(225,112,85,0.2);color:var(--phase5)}
.phase-6{background:rgba(214,48,49,0.2);color:var(--phase6)}
.week-card .wk-dates{font-size:0.78rem;color:var(--dim);margin-bottom:4px}
.week-card .wk-focus{font-size:0.82rem;color:var(--accent2);margin-bottom:10px}
.week-card .wk-progress{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.week-card .wk-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.3s}
.week-card .wk-stats{display:flex;justify-content:space-between;font-size:0.7rem;color:var(--dim);margin-top:6px}

/* Week Detail View */
.week-detail{display:none}
.week-detail.active{display:block}
.week-detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.week-detail-header h2{font-size:1.2rem;font-weight:700}
.back-btn{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:0.8rem;transition:all 0.2s}
.back-btn:hover{border-color:var(--accent);background:var(--card2)}
.week-nav{display:flex;gap:8px}
.week-nav button{padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--dim);cursor:pointer;font-size:0.8rem;transition:all 0.2s}
.week-nav button:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.week-nav button:disabled{opacity:0.3;cursor:not-allowed}

/* Day Cards */
.day-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:all 0.2s}
.day-card.today{border-color:var(--green);box-shadow:0 0 15px rgba(0,184,148,0.1)}
.day-card.completed{border-color:rgba(0,184,148,0.3)}
.day-card.sunday{border-left:3px solid var(--orange)}
.day-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;user-select:none}
.day-header:hover{background:rgba(255,255,255,0.02)}
.day-info{display:flex;align-items:center;gap:12px}
.day-num{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--card2);font-weight:700;font-size:0.85rem}
.day-card.today .day-num{background:var(--green);color:#fff}
.day-card.completed .day-num{background:rgba(0,184,148,0.2);color:var(--green2)}
.day-name-date .day-name{font-weight:600;font-size:0.9rem}
.day-name-date .day-date{font-size:0.75rem;color:var(--dim)}
.day-status{display:flex;align-items:center;gap:8px}
.day-pct{font-size:0.75rem;color:var(--dim)}
.day-dots{display:flex;gap:4px}
.day-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border)}
.day-dot.done{background:var(--green);border-color:var(--green)}
.day-dot.partial{background:var(--orange);border-color:var(--orange)}

.day-body{padding:0 16px 16px;display:none}
.day-card.expanded .day-body{display:block}

/* Task Blocks */
.task-block{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:all 0.2s}
.task-block.done{opacity:0.65;border-color:rgba(0,184,148,0.3)}
.task-check{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;margin-top:2px}
.task-check:hover{border-color:var(--accent)}
.task-check.checked{background:var(--green);border-color:var(--green)}
.task-check.checked::after{content:"\2713";color:#fff;font-size:0.75rem;font-weight:700}
.task-content{flex:1;min-width:0}
.task-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:4px}
.task-label.morning{color:var(--orange)}
.task-label.practice{color:var(--blue)}
.task-label.evening{color:var(--purple)}
.task-text{font-size:0.85rem;line-height:1.4}
.task-block.done .task-text{text-decoration:line-through;color:var(--dim)}

.day-notes{font-size:0.78rem;color:var(--dim);font-style:italic;padding:4px 0 0;border-top:1px solid var(--border);margin-top:4px;padding-top:8px}

/* Sunday special */
.sunday-protocol{background:rgba(253,203,110,0.05);border:1px solid rgba(253,203,110,0.2);border-radius:8px;padding:12px;margin-top:8px}
.sunday-protocol h4{color:var(--orange);font-size:0.8rem;margin-bottom:8px}
.sunday-protocol p{font-size:0.78rem;color:var(--dim);line-height:1.6}

/* Self Assessment */
.assessment-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px}
.assessment-section h3{font-size:1rem;margin-bottom:16px;color:var(--accent2)}
.assessment-field{margin-bottom:12px}
.assessment-field label{display:block;font-size:0.78rem;color:var(--dim);margin-bottom:4px}
.assessment-field input,.assessment-field textarea,.assessment-field select{width:100%;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem;font-family:inherit;outline:none;transition:border-color 0.2s}
.assessment-field input:focus,.assessment-field textarea:focus,.assessment-field select:focus{border-color:var(--accent)}
.assessment-field textarea{resize:vertical;min-height:60px}
.save-btn{padding:10px 24px;background:linear-gradient(135deg,var(--accent),var(--pink));border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:0.85rem;transition:opacity 0.2s}
.save-btn:hover{opacity:0.9}
.save-btn:active{transform:scale(0.98)}
.saved-msg{color:var(--green);font-size:0.78rem;margin-left:12px;opacity:0;transition:opacity 0.3s}
.saved-msg.show{opacity:1}

/* Phase Legend */
.phase-legend{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0;justify-content:center}
.phase-legend-item{font-size:0.7rem;display:flex;align-items:center;gap:4px}
.phase-dot{width:8px;height:8px;border-radius:50%}

/* Responsive */
@media(max-width:600px){
  .app{padding:10px}
  .header h1{font-size:1.2rem}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .dashboard-grid{grid-template-columns:1fr}
  .day-header{padding:10px 12px}
  .week-detail-header{flex-direction:column;align-items:flex-start}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}
</style>
</head>

const STORAGE_KEY = 'ca_planner_tracker_v1';
const EXAM_DATE = new Date('2026-09-08');

// State
let state = loadState();
let currentWeek = null;

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return { tasks: {}, assessments: {} };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function taskKey(weekId, dayNum, block) {
  return `w${weekId}_d${dayNum}_${block}`;
}

function isTaskDone(weekId, dayNum, block) {
  return !!state.tasks[taskKey(weekId, dayNum, block)];
}

function toggleTask(weekId, dayNum, block) {
  const key = taskKey(weekId, dayNum, block);
  state.tasks[key] = !state.tasks[key];
  saveState();
  render();
}

function getWeekProgress(weekId) {
  const week = PLANNER_DATA.weeks[weekId - 1];
  let total = 0, done = 0;
  week.days.forEach(day => {
    ['morning','practice','evening'].forEach(block => {
      total++;
      if (isTaskDone(weekId, day.num, block)) done++;
    });
  });
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function getDayProgress(weekId, dayNum) {
  let total = 3, done = 0;
  ['morning','practice','evening'].forEach(block => {
    if (isTaskDone(weekId, dayNum, block)) done++;
  });
  return { total, done, pct: Math.round(done/total*100) };
}

function getTotalProgress() {
  let total = 0, done = 0;
  PLANNER_DATA.weeks.forEach(week => {
    week.days.forEach(day => {
      ['morning','practice','evening'].forEach(block => {
        total++;
        if (isTaskDone(week.id, day.num, block)) done++;
      });
    });
  });
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function getCurrentWeekId() {
  const today = new Date();
  today.setHours(0,0,0,0);
  for (const week of PLANNER_DATA.weeks) {
    const dates = week.dates.replace(/\u2013/g, '–').split('–').map(s => s.trim());
    const startStr = dates[0] + ', 2026';
    const endStr = dates[1] + ', 2026';
    const start = new Date(startStr); start.setHours(0,0,0,0);
    const end = new Date(endStr); end.setHours(23,59,59,999);
    if (today >= start && today <= end) return week.id;
  }
  return null;
}

function getTodayStr() {
  const d = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const m = months[d.getMonth()];
  const day = d.getDate().toString().padStart(2, '0');
  return `${m} ${day}, 2026`;
}

function getPhaseClass(phase) {
  const num = phase.replace(/[^0-9]/g, '');
  return `phase-${num}`;
}

function getPhaseNum(phase) {
  return phase.replace(/[^0-9]/g, '');
}

function getStreakDays() {
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let d = new Date(today); ; d.setDate(d.getDate() - 1)) {
    let foundDay = false;
    for (const week of PLANNER_DATA.weeks) {
      for (const day of week.days) {
        const dayDate = new Date(day.date); dayDate.setHours(0,0,0,0);
        if (dayDate.getTime() === d.getTime()) {
          foundDay = true;
          const prog = getDayProgress(week.id, day.num);
          if (prog.done === 0) return streak;
          streak++;
        }
      }
    }
    if (!foundDay) {
      if (streak === 0) continue;
      return streak;
    }
  }
}

function getCompletedDays() {
  let count = 0;
  PLANNER_DATA.weeks.forEach(week => {
    week.days.forEach(day => {
      const prog = getDayProgress(week.id, day.num);
      if (prog.done === 3) count++;
    });
  });
  return count;
}

// Render
function render() {
  renderCountdown();
  renderStats();
  renderProgress();
  if (currentWeek) {
    renderWeekDetail(currentWeek);
  } else {
    renderDashboard();
  }
}

function renderCountdown() {
  const now = new Date();
  const diff = Math.ceil((EXAM_DATE - now) / (1000*60*60*24));
  document.getElementById('daysLeft').textContent = diff > 0 ? diff : 0;
}

function renderStats() {
  const total = getTotalProgress();
  const completedDays = getCompletedDays();
  const curWeek = getCurrentWeekId();
  const streak = getStreakDays();
  const weeksPassed = curWeek ? curWeek - 1 : 0;
  const weeksCompleted = PLANNER_DATA.weeks.filter(w => getWeekProgress(w.id).pct === 100).length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card stat-green"><div class="stat-value">${total.done}</div><div class="stat-label">Tasks Done</div></div>
    <div class="stat-card stat-blue"><div class="stat-value">${completedDays}</div><div class="stat-label">Full Days</div></div>
    <div class="stat-card stat-purple"><div class="stat-value">${weeksCompleted}/22</div><div class="stat-label">Weeks Done</div></div>
    <div class="stat-card stat-orange"><div class="stat-value">${streak}</div><div class="stat-label">Day Streak</div></div>
    <div class="stat-card stat-red"><div class="stat-value">${curWeek || '—'}</div><div class="stat-label">Current Week</div></div>
  `;
}

function renderProgress() {
  const total = getTotalProgress();
  const bar = document.getElementById('mainProgress');
  bar.style.width = total.pct + '%';
  bar.setAttribute('data-pct', total.pct + '%');
  document.getElementById('progressText').textContent = `${total.done} / ${total.total} tasks`;
}

function renderDashboard() {
  document.getElementById('dashboardView').style.display = 'block';
  document.getElementById('weekDetail').classList.remove('active');

  const curWeek = getCurrentWeekId();
  const grid = document.getElementById('dashboardGrid');
  grid.innerHTML = PLANNER_DATA.weeks.map(week => {
    const prog = getWeekProgress(week.id);
    const phaseNum = getPhaseNum(week.phase);
    const isCurrent = week.id === curWeek;
    return `
      <div class="week-card ${isCurrent ? 'current-week' : ''} fade-in" onclick="openWeek(${week.id})">
        <div class="wk-header">
          <span class="wk-name">${week.week}</span>
          <span class="wk-phase phase-${phaseNum}">${week.phase}</span>
        </div>
        <div class="wk-dates">${week.dates}</div>
        <div class="wk-focus">${week.focus}</div>
        <div class="wk-progress"><div class="wk-progress-fill" style="width:${prog.pct}%"></div></div>
        <div class="wk-stats">
          <span>${prog.done}/${prog.total} tasks</span>
          <span>${prog.pct}%</span>
        </div>
      </div>
    `;
  }).join('');
}

function openWeek(weekId) {
  currentWeek = weekId;
  document.getElementById('dashboardView').style.display = 'none';
  document.getElementById('weekDetail').classList.add('active');
  renderWeekDetail(weekId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  currentWeek = null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

  const week = PLANNER_DATA.weeks[weekId - 1];

        <button onclick="openWeek(${weekId - 1})" ${weekId <= 1 ? 'disabled' : ''}>← Week ${weekId - 1}</button>

      </div>

    <div style="margin-bottom:16px">

      <div class="assessment-field">
        <label>Sunday test subject & score</label>
        <input type="text" id="assess_test" value="${assessment.test || ''}" placeholder="e.g. Adv Acc — 62/100">
      </div>
      <div class="assessment-field">
        <label>Biggest win this week</label>
        <textarea id="assess_win" placeholder="What went well?">${assessment.win || ''}</textarea>
      </div>
      <div class="assessment-field">
        <label>Biggest struggle</label>
        <textarea id="assess_struggle" placeholder="What was hard?">${assessment.struggle || ''}</textarea>
      </div>
      <div class="assessment-field">
        <label>Subjects needing extra attention</label>
        <input type="text" id="assess_attention" value="${assessment.attention || ''}" placeholder="e.g. Costing, Law">
      </div>
      <div class="assessment-field">
        <label>On track?</label>
        <select id="assess_track">
          <option value="">Select...</option>
          <option value="Ahead" ${assessment.track === 'Ahead' ? 'selected' : ''}>Ahead</option>
          <option value="Yes" ${assessment.track === 'Yes' ? 'selected' : ''}>Yes — On Track</option>
          <option value="Behind" ${assessment.track === 'Behind' ? 'selected' : ''}>Behind</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;margin-top:8px">
        <button class="save-btn" onclick="saveAssessment(${weekId})">Save Assessment</button>
        <span class="saved-msg" id="savedMsg">Saved!</span>
      </div>
    </div>
  `;
}

function renderDayCard(weekId, day, todayStr) {
  const isToday = day.date.includes(todayStr.split(', ')[0]) && day.date.includes('2026');
  const isSunday = day.day === 'Sunday';
  const prog = getDayProgress(weekId, day.num);
  const morningDone = isTaskDone(weekId, day.num, 'morning');
  const practiceDone = isTaskDone(weekId, day.num, 'practice');
  const eveningDone = isTaskDone(weekId, day.num, 'evening');
  const allDone = prog.done === 3;

  // Determine today based on actual date comparison
  const dayDate = new Date(day.date);
  const now = new Date();
  dayDate.setHours(0,0,0,0); now.setHours(0,0,0,0);
  const isActualToday = dayDate.getTime() === now.getTime();
  const expandDefault = isActualToday;

  return `
    <div class="day-card ${isActualToday ? 'today' : ''} ${allDone ? 'completed' : ''} ${isSunday ? 'sunday' : ''} ${expandDefault ? 'expanded' : ''}" id="day_${weekId}_${day.num}">
      <div class="day-header" onclick="toggleDayExpand(${weekId}, ${day.num})">
        <div class="day-info">
          <div class="day-num">${day.num}</div>
          <div class="day-name-date">
            <div class="day-name">${day.day}${isActualToday ? ' — TODAY' : ''}</div>
            <div class="day-date">${day.date}</div>
          </div>
        </div>
        <div class="day-status">
          <span class="day-pct">${prog.done}/3</span>
          <div class="day-dots">
            <div class="day-dot ${morningDone ? 'done' : ''}" title="Morning"></div>
            <div class="day-dot ${practiceDone ? 'done' : ''}" title="Practice"></div>
            <div class="day-dot ${eveningDone ? 'done' : ''}" title="Evening"></div>
          </div>
        </div>
      </div>
      <div class="day-body">
        <div class="task-block ${morningDone ? 'done' : ''}">
          <div class="task-check ${morningDone ? 'checked' : ''}" onclick="event.stopPropagation();toggleTask(${weekId},${day.num},'morning')"></div>
          <div class="task-content">
            <div class="task-label morning">Morning — 7:15–11:30</div>
            <div class="task-text">${day.morning}</div>
          </div>
        </div>
        <div class="task-block ${practiceDone ? 'done' : ''}">
          <div class="task-check ${practiceDone ? 'checked' : ''}" onclick="event.stopPropagation();toggleTask(${weekId},${day.num},'practice')"></div>
          <div class="task-content">
            <div class="task-label practice">Practice — 12:00–2:00</div>
            <div class="task-text">${day.practice}</div>
          </div>
        </div>
        <div class="task-block ${eveningDone ? 'done' : ''}">
          <div class="task-check ${eveningDone ? 'checked' : ''}" onclick="event.stopPropagation();toggleTask(${weekId},${day.num},'evening')"></div>
          <div class="task-content">
            <div class="task-label evening">Evening — 3:00–7:30</div>
            <div class="task-text">${day.evening}</div>
          </div>
        </div>
        ${day.notes ? `<div class="day-notes">${day.notes}</div>` : ''}
        ${isSunday ? `
        <div class="sunday-protocol">
          <h4>SUNDAY PROTOCOL</h4>
          <p>7:00–7:30 Setup | 7:30–10:30 Subject Test (3 hrs strict) | 10:30–11:00 Break | 11:00–1:00 Self-evaluation | 1:00–2:00 Lunch | 2:00–4:00 Weak area study | 4:00–5:00 Error Log + planning | 5:00+ REST</p>
        </div>` : ''}
      </div>
    </div>
  `;
}

function toggleDayExpand(weekId, dayNum) {
  const card = document.getElementById(`day_${weekId}_${dayNum}`);
  card.classList.toggle('expanded');
}

function saveAssessment(weekId) {
  state.assessments[weekId] = {
    hours: document.getElementById('assess_hours').value,
    test: document.getElementById('assess_test').value,
    win: document.getElementById('assess_win').value,
    struggle: document.getElementById('assess_struggle').value,
    attention: document.getElementById('assess_attention').value,
    track: document.getElementById('assess_track').value,
  };
  saveState();
  const msg = document.getElementById('savedMsg');
  msg.classList.add('show');
  setTimeout(() => msg.classList.remove('show'), 2000);
}

// Init
render();

// Auto-open current week if exists
const curWeek = getCurrentWeekId();
if (curWeek) openWeek(curWeek);
</script>
</body>
</html>
